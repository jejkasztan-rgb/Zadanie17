<!DOCTYPE html>
<html lang="PL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje wymarzone miejsce na wakacje</title>
<style>

/* Podstawowy styl całej strony */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

/* Nagłówek strony */
header {
    background: #555;
    color: white;
    padding: 20px;
    text-align: center;
}

/* Linki w menu nawigacyjnym */
nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* Efekt po najechaniu myszką na link */
nav a:hover {
    color: yellow;
}

/* Sekcja galerii */
.hero {
    background: linear-gradient(to right, #ff6e40, #ffcc00);
    text-align: center;
    padding: 60px;
    color: white;
}

/* Główna sekcja slidera */
.slider {
    text-align: center;
    margin-top: 30px;
}

/* Styl zdjęcia w sliderze */
.slider img {
    width: 80%;
    border-radius: 10px;
}

/* Przyciski zmiany zdjęć */
.buttons button {
    padding: 10px 20px;
    margin: 10px;
    background: #555;
    color: white;
    border: none;
    cursor: pointer;
}

/* Efekt po najechaniu myszką na przycisk */
button:hover {
    background: #ff6e40;
}

/* Sekcja strony */
section {
    padding: 30px;
}

/* Stopka */
footer {
    background: #555;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Ustawienie rozmiaru obrazów */
img {
    width: 500px;
    height: 700px;
}

</style>
</head>

<body>

<!-- Nagłówek strony -->
<header>
    <h1>Galeria zdjęć</h1>

    <!-- Menu nawigacyjne -->
    <nav>
        <a href="ZADANIE17.html">Strona główna</a>
        <a href="ZADANIE17_1.html">Galeria</a>
        <a href="ZADANIE17_2.html">Informacje</a>
    </nav>
</header>

<!-- Sekcja slidera -->
<section class="slider">

    <!-- Przyciski do zmiany zdjęć -->
    <div class="buttons">
        <button onclick="prevSlide()">Poprzednie</button>
        <button onclick="nextSlide()">Następne</button>
    </div>

    <!-- Obraz wyświetlany w sliderze -->
    <img id="slide" src="img/nowyjork.jpg" alt="slider">

</section>

<script>

/*
Tablica przechowująca wszystkie zdjęcia,
które będą wyświetlane w sliderze
*/
const images = [
    "img/nowyjork.jpg",
    "img/nowyjork1.jpg",
    "img/nowyjork2.jpg",
    "img/nowyjork3.jpg",
    "img/chiny.jpg",
    "img/chiny1.jpg",
    "img/chiny2.jpg",
    "img/chiny3.jpg",
    "img/tokio.jpg",
    "img/tokio1.jpg",
    "img/tokio2.jpg"
];

/* Zmienna przechowująca numer aktualnego zdjęcia */
let current = 0;

/*
Funkcja pokazująca następne zdjęcie
Po osiągnięciu końca galerii wraca do pierwszego
*/
function nextSlide() {
    current = (current + 1) % images.length;
    document.getElementById("slide").src = images[current];
}

/*
Funkcja pokazująca poprzednie zdjęcie
Jeśli jesteśmy na pierwszym zdjęciu,
wraca do ostatniego
*/
function prevSlide() {
    current = (current - 1 + images.length) % images.length;
    document.getElementById("slide").src = images[current];
}

</script>

<!-- Stopka strony -->
<footer>
<p>Autor: Nowakowski Krzysztof 2P | Projekt Wymarzone miejsce na wakacje</p>
</footer>

</body>
</html>
